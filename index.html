<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>

<body>
  <div>
    <img src="cat.webp" alt="cat" style="width: 20rem">
    <h1>Welcome to my website</h1>
    <p>Isn't this cool?</p>
    <form>
      <input type="text" id="name" placeholder="Your name">
      <button onclick="greet()">Click Me</button>
    </form>
  </div>
  <script>
    function greet() {
      var name = document.getElementById("name").value;
      alert("Hello! "+name)
    }
  </script>
</body>

</html>
